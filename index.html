<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Playlist</title>

<style>
body {
    background-color: #FFA733;
    font-family: "Courier New", monospace;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    margin: 0;
    min-height: 100vh;
    padding: 20px;
    box-sizing: border-box;

    text-align: center;
}

h1 {
    color: black;
    font-size: clamp(28px, 8vw, 60px);
    margin-bottom: 20px;
}

audio {
    width: min(90vw, 400px);
    margin-top: 20px;
}

/* Playlist */
#playlist {
    margin-top: 15px;
    width: min(90vw, 400px);
    text-align: left;
}

/* Song card */
.song {
    padding: 10px;
    margin: 8px 0;
    background: rgba(0,0,0,0.1);
    border-radius: 10px;
    color: black;
    cursor: pointer;
    overflow: hidden;
}

.song-header {
    display: flex;
    align-items: center;
    gap: 10px;
}

.song img {
    width: 45px;
    height: 45px;
    border-radius: 6px;
    object-fit: cover;
}

.song-details {
    display: none;
    margin-top: 8px;
    font-size: 14px;
    opacity: 0.85;
}

/* active song */
.active {
    background: black;
    color: #FFA733;
}

/* buttons */
.controls {
    margin-top: 15px;
}

button {
    font-family: "Courier New", monospace;
    font-size: 18px;
    padding: 10px 18px;
    margin: 5px;

    background: black;
    color: #FFA733;

    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>хорошей зарядки бабуля!</h1>

<audio id="player" controls></audio>

<div id="playlist"></div>

<div class="controls">
    <button onclick="prevSong()">⏮ Предыдущая</button>
    <button onclick="nextSong()">⏭ Следующая</button>
</div>

<script>
const songs = [
    {
        file: "song1.mp3",
        name: "Claire De Lune",
        artist: "Claude Debussy",
        cover: "cover1.jpg",
        info: "A calm impressionist piano masterpiece."
    },
    {
        file: "song2.mp3",
        name: "Spring 1",
        artist: "Vivaldi",
        cover: "cover2.jpg",
        info: "From The Four Seasons - Spring."
    },
    {
        file: "song3.mp3",
        name: "The Strong",
        artist: "Unknown",
        cover: "cover3.jpg",
        info: "Powerful orchestral track."
    },
    {
        file: "song4.mp3",
        name: "Comptine D'un Autre Ete",
        artist: "Yann Tiersen",
        cover: "cover4.jpg",
        info: "From the Amélie soundtrack."
    }
];

let currentSong = 0;

const player = document.getElementById("player");
const playlistDiv = document.getElementById("playlist");

/* ---------------- ERROR DEBUG ---------------- */
player.addEventListener("error", () => {
    console.log("Audio error:", player.error);
    alert("Audio failed to load. Check file names, path, or format.");
});

/* ---------------- RENDER ---------------- */
function renderPlaylist() {
    playlistDiv.innerHTML = "";

    songs.forEach((song, index) => {
        const div = document.createElement("div");
        div.className = "song";

        if (index === currentSong) {
            div.classList.add("active");
        }

        div.innerHTML = `
            <div class="song-header">
                <img src="${song.cover}" alt="cover">
                <div>
                    <strong>${song.name}</strong><br>
                    <small>${song.artist}</small>
                </div>
            </div>

            <div class="song-details">
                ${song.info}
            </div>
        `;

        div.addEventListener("click", (e) => {
            const details = div.querySelector(".song-details");

            // toggle info
            details.style.display =
                details.style.display === "block" ? "none" : "block";

            // if not clicking info area → play song
            if (!e.target.closest(".song-details")) {
                playSong(index);
            }
        });

        playlistDiv.appendChild(div);
    });
}

/* ---------------- PLAY ---------------- */
function playSong(index) {
    currentSong = index;

    player.pause();
    player.src = songs[index].file;
    player.load();

    player.play().catch(err => {
        console.log("Playback error:", err);
    });

    renderPlaylist();
}

/* ---------------- CONTROLS ---------------- */
function nextSong() {
    currentSong = (currentSong + 1) % songs.length;
    playSong(currentSong);
}

function prevSong() {
    currentSong = (currentSong - 1 + songs.length) % songs.length;
    playSong(currentSong);
}

/* ---------------- AUTO NEXT ---------------- */
player.addEventListener("ended", nextSong);

/* ---------------- INIT (NO AUTOPLAY) ---------------- */
function init() {
    renderPlaylist();
    player.src = songs[0].file;
    player.load();
}

init();
</script>

</body>
</html>
