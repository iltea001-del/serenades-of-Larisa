<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Playlist</title>

    <style>
        body {
            background-color: #FFA733;
            font-family: "Courier New", monospace;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            margin: 0;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;

            text-align: center;
        }

        h1 {
            color: black;
            font-size: clamp(28px, 8vw, 60px);
            margin-bottom: 20px;
        }

        audio {
            width: min(90vw, 400px);
            margin-top: 20px;
        }

        #playlist {
            margin-top: 15px;
            width: min(90vw, 400px);
            text-align: left;
        }

        .song {
            padding: 8px;
            margin: 5px 0;
            background: rgba(0,0,0,0.1);
            border-radius: 6px;
            color: black;
        }

        .active {
            background: black;
            color: #FFA733;
        }

        .controls {
            margin-top: 15px;
        }

        button {
            font-family: "Courier New", monospace;
            font-size: 18px;
            padding: 10px 18px;
            margin: 5px;

            background: black;
            color: #FFA733;

            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h1>хорошей зарядки бабуля!</h1>

<audio id="player" controls></audio>

<div id="playlist"></div>

<div class="controls">
    <button onclick="prevSong()">⏮ Предыдущая</button>
    <button onclick="nextSong()">⏭ Следующая</button>
</div>

<script>
const songs = [
    { file: "song1.mp3", name: "Claire De Lune" },
    { file: "song2.mp3", name: "Spring 1" },
    { file: "song3.mp3", name: "The Strong" },
    { file: "song4.mp3", name: "JComptine D'un Autre Ete, L'apres-midi" },
    { file: "song5.mp3", name: "Joycelyn's Dance" },
    { file: "song6.mp3", name: "Porcelain" },
    { file: "song7.mp3", name: "Like A Tattoo" }
];

let currentSong = 0;

const player = document.getElementById("player");
const playlistDiv = document.getElementById("playlist");

function renderPlaylist() {
    playlistDiv.innerHTML = "";

    songs.forEach((song, index) => {
        const div = document.createElement("div");
        div.className = "song";
        div.innerText = song.name;

        if (index === currentSong) {
            div.classList.add("active");
        }

        playlistDiv.appendChild(div);
    });
}

function playSong(index) {
    currentSong = index;
    player.src = songs[index].file;
    player.play();
    renderPlaylist();
}

function nextSong() {
    currentSong = (currentSong + 1) % songs.length;
    playSong(currentSong);
}

function prevSong() {
    currentSong = (currentSong - 1 + songs.length) % songs.length;
    playSong(currentSong);
}

player.addEventListener("ended", nextSong);

playSong(0);
</script>

</body>
</html>
