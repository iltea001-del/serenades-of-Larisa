<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Playlist</title>

    <style>
        body {
            background-color: #FFA733;
            font-family: "Courier New", monospace;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            margin: 0;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;

            text-align: center;
        }

        h1 {
            color: black;
            font-size: clamp(28px, 8vw, 60px);
            margin-bottom: 20px;
        }

        audio {
            width: min(90vw, 400px);
            margin-top: 20px;
        }

        #playlist {
            margin-top: 15px;
            width: min(90vw, 400px);
            text-align: left;
        }

        .song {
            padding: 10px;
            margin: 6px 0;
            background: rgba(0,0,0,0.1);
            border-radius: 8px;
            color: black;
            cursor: pointer;
        }

        .song-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .song img {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            object-fit: cover;
        }

        .song-details {
            display: none;
            margin-top: 8px;
            font-size: 14px;
            opacity: 0.85;
        }

        .active {
            background: black;
            color: #FFA733;
        }
    </style>
</head>

<body>

<h1>хорошей зарядки бабуля!</h1>

<audio id="player" controls></audio>

<div id="playlist"></div>

<script>
const songs = [
    {
        file: "song1.mp3",
        name: "Claire De Lune",
        artist: "Claude Debussy",
        cover: "cover1.jpg",
        info: "A calm impressionist piano masterpiece."
    },
    {
        file: "song2.mp3",
        name: "Spring 1",
        artist: "Max Richter",
        cover: "cover2.jpg",
        info: "From The Four Seasons - Spring."
    },
    {
        file: "song3.mp3",
        name: "The Strong",
        artist: "Ennio Morricone",
        cover: "cover3.jpg",
        info: "Powerful orchestral track."
    },
    {
        file: "song4.mp3",
        name: "Comptine D'un Autre Ete",
        artist: "Yann Tiersen",
        cover: "cover4.jpg",
        info: "From Amélie soundtrack."
    },
    {
        file: "song5.mp3",
        name: "Joycelyn's Dance",
        artist: "berlioz",
        cover: "cover5.jpg",
        info: "Soft emotional piano piece."
    },
    {
        file: "song6.mp3",
        name: "Porcelain",
        artist: "Moby",
        cover: "cover6.jpg",
        info: "Electronic ambient classic."
    },
    {
        file: "song7.mp3",
        name: "Like A Tattoo",
        artist: "Sade",
        cover: "cover7.jpg",
        info: "Smooth jazz-inspired track."
    }
];

let currentSong = 0;

const player = document.getElementById("player");
const playlistDiv = document.getElementById("playlist");

// error debug
player.addEventListener("error", () => {
    console.log("Audio error:", player.error);
    alert("Audio failed to load. Check file names, path, or format.");
});

// render playlist
function renderPlaylist() {
    playlistDiv.innerHTML = "";

    songs.forEach((song, index) => {
        const div = document.createElement("div");
        div.className = "song";

        if (index === currentSong) {
            div.classList.add("active");
        }

        div.innerHTML = `
            <div class="song-header">
                <img src="${song.cover}" alt="cover">
                <div>
                    <strong>${song.name}</strong><br>
                    <small>${song.artist}</small>
                </div>
            </div>

            <div class="song-details">
                ${song.info}
            </div>
        `;

        div.addEventListener("click", () => {
            playSong(index);
        });

        playlistDiv.appendChild(div);
    });
}

// play song safely
function playSong(index) {
    currentSong = index;

    player.pause();
    player.src = songs[index].file;
    player.load();

    player.play().catch(err => {
        console.log("Playback error:", err);
    });

    renderPlaylist();
}

// auto next song
player.addEventListener("ended", () => {
    currentSong = (currentSong + 1) % songs.length;
    playSong(currentSong);
});

// init (NO AUTOPLAY)
function init() {
    renderPlaylist();
    player.src = songs[0].file;
    player.load();
}

init();
</script>

</body>
</html>
