<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist</title>

<style>
body{
    background:#FFA733;
    font-family:"Courier New", monospace;
    margin:0;
    min-height:100vh;
    padding:20px;
    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    align-items:center;

    text-align:center;
}

h1{
    color:black;
    font-size:clamp(28px,8vw,60px);
    margin-bottom:20px;
}

audio{
    width:min(90vw,420px);
    margin-bottom:15px;
}

#playlist{
    width:min(90vw,420px);
    text-align:left;
}

.song{
    background:rgba(0,0,0,0.10);
    border-radius:10px;
    margin:8px 0;
    padding:10px;
    color:black;
    cursor:pointer;
    transition:0.25s ease;
    overflow:hidden;
}

.song:hover{
    transform:translateY(-1px);
}

.song-header{
    display:flex;
    align-items:center;
    gap:12px;
}

.song img{
    width:52px;
    height:52px;
    border-radius:8px;
    object-fit:cover;
    flex-shrink:0;
}

.song-title{
    font-weight:bold;
}

.song-artist{
    font-size:14px;
    opacity:0.8;
}

.song-details{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.35s ease, margin-top 0.35s ease;
    margin-top:0;
    font-size:14px;
    line-height:1.45;
}

.song.active{
    background:black;
    color:#FFA733;
}

.song.active .song-details{
    max-height:220px;
    margin-top:10px;
}

.meta{
    font-weight:bold;
    margin-bottom:6px;
}
</style>
</head>

<body>

<h1>хорошей зарядки бабуля!</h1>

<audio id="player" controls></audio>

<div id="playlist"></div>

<script>
const songs = [
{
    file:"song1.mp3",
    name:"Claire De Lune",
    artist:"Claude Debussy",
    year:"1905",
    cover:"cover1.jpg",
    info:"One of the most famous piano works ever written. Calm, dreamy and atmospheric."
},
{
    file:"song2.mp3",
    name:"Spring 1",
    artist:"Max Richter",
    year:"2012",
    cover:"cover2.jpg",
    info:"A modern re-composition inspired by Vivaldi's Four Seasons."
},
{
    file:"song3.mp3",
    name:"The Strong",
    artist:"Ennio Morricone",
    year:"1970s",
    cover:"cover3.jpg",
    info:"Cinematic orchestral writing with emotional power and tension."
},
{
    file:"song4.mp3",
    name:"Comptine D'un Autre Ete",
    artist:"Yann Tiersen",
    year:"2001",
    cover:"cover4.jpg",
    info:"Minimalist piano classic made famous by the film Amélie."
},
{
    file:"song5.mp3",
    name:"Joycelyn's Dance",
    artist:"berlioz",
    year:"2020s",
    cover:"cover5.jpg",
    info:"Modern jazz-inspired groove with smooth rhythm and elegant texture."
},
{
    file:"song6.mp3",
    name:"Porcelain",
    artist:"Moby",
    year:"1999",
    cover:"cover6.jpg",
    info:"Iconic downtempo electronic track from the album Play."
},
{
    file:"song7.mp3",
    name:"Like A Tattoo",
    artist:"Sade",
    year:"2000",
    cover:"cover7.jpg",
    info:"Elegant, intimate and emotional vocal performance."
}
];

let currentSong = 0;

const player = document.getElementById("player");
const playlistDiv = document.getElementById("playlist");

/* ---------- ERROR HANDLER ---------- */
player.addEventListener("error", () => {
    alert("Failed to load: " + player.src);
});

/* ---------- RENDER ---------- */
function renderPlaylist() {
    playlistDiv.innerHTML = "";

    songs.forEach((song, index) => {
        const card = document.createElement("div");
        card.className = "song";

        if(index === currentSong){
            card.classList.add("active");
        }

        card.innerHTML = `
            <div class="song-header">
                <img src="${song.cover}" alt="cover">
                <div>
                    <div class="song-title">${song.name}</div>
                    <div class="song-artist">${song.artist}</div>
                </div>
            </div>

            <div class="song-details">
                <div class="meta">Year: ${song.year}</div>
                <div>${song.info}</div>
            </div>
        `;

        card.addEventListener("click", () => {
            playSong(index);
        });

        playlistDiv.appendChild(card);
    });
}

/* ---------- PLAY ---------- */
function playSong(index){
    currentSong = index;

    player.pause();
    player.src = songs[index].file;
    player.load();

    player.play().catch(err => {
        console.log(err);
    });

    renderPlaylist();
}

/* ---------- AUTO NEXT ---------- */
player.addEventListener("ended", () => {
    currentSong = (currentSong + 1) % songs.length;
    playSong(currentSong);
});

/* ---------- INIT ---------- */
function init(){
    renderPlaylist();
    player.src = songs[0].file;
    player.load();
}

init();
</script>

</body>
</html>
