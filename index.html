<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Playlist</title>

    <style>
        body {
            background-color: #FFA733;

            font-family: "Courier New", monospace;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;

            margin: 0;
            height: 100vh;

            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: clamp(28px, 8vw, 60px);
            color: black;
            margin-bottom: 20px;
        }

        audio {
            width: min(90vw, 400px);
        }

        .controls {
            margin-top: 20px;
        }

        button {
            font-family: "Courier New", monospace;
            font-size: 20px;
            padding: 12px 22px;
            margin: 6px;

            background: black;
            color: #FFA733;

            border: none;
            border-radius: 10px;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

<h1>хорошей зарядки бабуля!</h1>

<audio id="player" controls></audio>

<div class="controls">
    <button onclick="prevSong()">⏮ Предыдущая</button>
    <button onclick="nextSong()">⏭ Следующая</button>
</div>

<script>
const songs = [
    "song1.mp3",
    "song2.mp3",
    "song3.mp3"
];

let currentSong = 0;
const player = document.getElementById("player");

function playSong(index) {
    player.src = songs[index];
    player.play();
}

function nextSong() {
    currentSong = (currentSong + 1) % songs.length;
    playSong(currentSong);
}

function prevSong() {
    currentSong = (currentSong - 1 + songs.length) % songs.length;
    playSong(currentSong);
}

player.addEventListener("ended", nextSong);

playSong(currentSong);
</script>

</body>
</html>
