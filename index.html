<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Плейлист</title>

<style>
body{
    background:#FFA733;
    font-family:"Courier New", monospace;
    margin:0;
    min-height:100vh;
    padding:20px;
    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

h1{
    color:black;
    font-size:clamp(28px,8vw,60px);
    margin-bottom:20px;
}

audio{
    width:min(90vw,420px);
    margin-bottom:15px;
}

#playlist{
    width:min(90vw,420px);
    text-align:left;
}

.song{
    background:rgba(0,0,0,0.10);
    border-radius:14px;
    margin:10px 0;
    padding:12px;
    color:black;
    cursor:pointer;
    overflow:hidden;

    transition:
        transform 0.25s ease,
        background 0.35s ease,
        color 0.35s ease,
        box-shadow 0.35s ease;
}

.song:hover{
    transform:translateY(-2px);
}

.song.active{
    background:black;
    color:#FFA733;
    box-shadow:0 8px 20px rgba(0,0,0,0.18);
}

.song-header{
    display:flex;
    align-items:center;
    gap:12px;
}

.song img{
    width:56px;
    height:56px;
    border-radius:10px;
    object-fit:cover;
    flex-shrink:0;
    transition:transform 0.35s ease;
}

.song.active img{
    transform:scale(1.04);
}

.song-title{
    font-weight:bold;
    font-size:16px;
}

.song-artist{
    font-size:14px;
    opacity:0.85;
}

/* smoother expanding animation */
.song-details{
    display:grid;
    grid-template-rows:0fr;
    opacity:0;
    transition:
        grid-template-rows 0.55s cubic-bezier(0.22,1,0.36,1),
        opacity 0.35s ease,
        margin-top 0.35s ease;
    margin-top:0;
}

.song-details-inner{
    overflow:hidden;
    min-height:0;
    font-size:14px;
    line-height:1.5;
}

.song.active .song-details{
    grid-template-rows:1fr;
    opacity:1;
    margin-top:12px;
}

.meta{
    font-weight:bold;
    margin-bottom:8px;
}
</style>
</head>

<body>

<h1>хорошей зарядки бабуля!</h1>

<audio id="player" controls></audio>

<div id="playlist"></div>

<script>
const songs = [
{
    file:"song1.mp3",
    name:"Clair de Lune",
    artist:"Клод Дебюсси",
    year:"1905",
    cover:"cover1.jpg",
    info:"Одна из самых известных фортепианных пьес в мире. Название переводится как «Лунный свет». Музыка напоминает тихий вечер, лунное сияние и спокойствие."
},
{
    file:"song2.mp3",
    name:"Spring 1",
    artist:"Макс Рихтер",
    year:"2012",
    cover:"cover2.jpg",
    info:"Современное переосмысление музыки Вивальди. Композиция о весне, пробуждении природы и свежем дыхании нового времени."
},
{
    file:"song3.mp3",
    name:"The Strong",
    artist:"Эннио Морриконе",
    year:"1970-е",
    cover:"cover3.jpg",
    info:"Музыка знаменитого кинокомпозитора. Звучание передаёт силу характера, решительность и внутреннюю стойкость."
},
{
    file:"song4.mp3",
    name:"Comptine d’un autre été",
    artist:"Ян Тьерсен",
    year:"2001",
    cover:"cover4.jpg",
    info:"Прославилась после фильма «Амели». Лёгкая грусть, воспоминания и тёплая французская атмосфера."
},
{
    file:"song5.mp3",
    name:"Joycelyn's Dance",
    artist:"Берлиоз",
    year:"2020-е",
    cover:"cover5.jpg",
    info:"Современная композиция с джазовым настроением. Лёгкость, движение и чувство красивого танца."
},
{
    file:"song6.mp3",
    name:"Porcelain",
    artist:"Моби",
    year:"1999",
    cover:"cover6.jpg",
    info:"Очень известная спокойная композиция. Часто ассоциируется с дорогой, воспоминаниями и внутренним покоем."
},
{
    file:"song7.mp3",
    name:"Like A Tattoo",
    artist:"Шаде",
    year:"2000",
    cover:"cover7.jpg",
    info:"Песня о памяти и чувствах, которые остаются с человеком навсегда, словно след на сердце."
}
];

let currentSong = 0;

const player = document.getElementById("player");
const playlistDiv = document.getElementById("playlist");

/* ошибка загрузки */
player.addEventListener("error", () => {
    alert("Не удалось загрузить файл: " + player.src);
});

/* список песен */
function renderPlaylist(){
    playlistDiv.innerHTML = "";

    songs.forEach((song, index) => {
        const card = document.createElement("div");
        card.className = "song";

        if(index === currentSong){
            card.classList.add("active");
        }

        card.innerHTML = `
            <div class="song-header">
                <img src="${song.cover}" alt="Обложка">
                <div>
                    <div class="song-title">${song.name}</div>
                    <div class="song-artist">${song.artist}</div>
                </div>
            </div>

            <div class="song-details">
                <div class="song-details-inner">
                    <div class="meta">Год: ${song.year}</div>
                    <div>${song.info}</div>
                </div>
            </div>
        `;

        card.addEventListener("click", () => {
            playSong(index);
        });

        playlistDiv.appendChild(card);
    });
}

/* воспроизведение */
function playSong(index){
    currentSong = index;

    player.pause();
    player.src = songs[index].file;
    player.load();

    player.play().catch(err => {
        console.log(err);
    });

    renderPlaylist();
}

/* автопереход */
player.addEventListener("ended", () => {
    currentSong = (currentSong + 1) % songs.length;
    playSong(currentSong);
});

/* запуск */
function init(){
    renderPlaylist();
    player.src = songs[0].file;
    player.load();
}

init();
</script>

</body>
</html>
