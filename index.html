<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Плейлист</title>

<style>
body{
    background:#FFA733;
    font-family:"Courier New", monospace;
    margin:0;
    min-height:100vh;
    padding:20px;
    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

h1{
    color:black;
    font-size:clamp(28px,8vw,60px);
    margin-bottom:20px;
}

audio{
    width:min(90vw,420px);
    margin-bottom:15px;
}

#playlist{
    width:min(90vw,420px);
    text-align:left;
}

.song{
    background:rgba(0,0,0,0.10);
    border-radius:14px;
    margin:10px 0;
    padding:12px;
    color:black;
    cursor:pointer;
    overflow:hidden;

    transition:
        transform 0.25s ease,
        background 0.35s ease,
        color 0.35s ease,
        box-shadow 0.35s ease;
}

.song:hover{
    transform:translateY(-2px);
}

.song.active{
    background:black;
    color:#FFA733;
    box-shadow:0 8px 20px rgba(0,0,0,0.18);
}

.song-header{
    display:flex;
    align-items:center;
    gap:12px;
}

.song img{
    width:56px;
    height:56px;
    border-radius:10px;
    object-fit:cover;
    flex-shrink:0;
    transition:transform 0.35s ease;
}

.song.active img{
    transform:scale(1.04);
}

.song-title{
    font-weight:bold;
    font-size:16px;
}

.song-artist{
    font-size:14px;
    opacity:0.85;
}

.song-details{
    display:grid;
    grid-template-rows:0fr;
    opacity:0;
    transition:
        grid-template-rows 0.55s cubic-bezier(0.22,1,0.36,1),
        opacity 0.35s ease,
        margin-top 0.35s ease;
    margin-top:0;
}

.song-details-inner{
    overflow:hidden;
    min-height:0;
    font-size:14px;
    line-height:1.5;
}

.song.active .song-details{
    grid-template-rows:1fr;
    opacity:1;
    margin-top:12px;
}

.meta{
    font-weight:bold;
    margin-bottom:8px;
}
</style>
</head>

<body>

<h1>хорошей зарядки бабуля!</h1>

<audio id="player" controls></audio>

<div id="playlist"></div>

<script>
const songs = [
{
    file:"song1.mp3",
    name:"Clair de Lune",
    artist:"Клод Дебюсси",
    year:"1905",
    cover:"cover1.jpg",
    info:"Название переводится как «Лунный свет». Пьеса входит в цикл Suite bergamasque. Её название связано со стихотворением Поля Верлена, где описывается ночной сад под луной. Дебюсси долго перерабатывал произведение перед публикацией, поэтому окончательная версия появилась спустя годы после первых набросков."
},
{
    file:"song2.mp3",
    name:"Spring 1",
    artist:"Макс Рихтер",
    year:"2012",
    cover:"cover2.jpg",
    info:"Композиция создана как часть проекта Recomposed, где Макс Рихтер заново переосмыслил цикл Вивальди «Времена года». За основу была взята тема весны, но структура и звучание были изменены современными средствами. Это соединение старой классической идеи и нового музыкального языка."
},
{
    file:"song3.mp3",
    name:"The Strong",
    artist:"Эннио Морриконе",
    year:"1970-е",
    cover:"cover3.jpg",
    info:"Эннио Морриконе известен музыкой к фильмам и сериалам. Многие его произведения создавались как часть экранных историй, где музыка помогала раскрывать характеры героев и события сюжета. Эта композиция относится к его периоду активной работы для кино."
},
{
    file:"song4.mp3",
    name:"Comptine d’un autre été",
    artist:"Ян Тьерсен",
    year:"2001",
    cover:"cover4.jpg",
    info:"Название можно перевести как «Песенка другого лета». Произведение стало широко известно после использования в фильме «Амели». Ян Тьерсен написал его как часть музыкального сопровождения картины, где каждая пьеса помогала передать атмосферу Парижа и внутренний мир героини."
},
{
    file:"song5.mp3",
    name:"Joycelyn's Dance",
    artist:"Берлиоз",
    year:"2020-е",
    cover:"cover5.jpg",
    info:"Композиция выпущена современным музыкантом berlioz, который работает с элементами джаза, электронной музыки и живого ритма. Название указывает на танец и построено как небольшая музыкальная сцена, посвящённая движению и пластике."
},
{
    file:"song6.mp3",
    name:"Porcelain",
    artist:"Моби",
    year:"1999",
    cover:"cover6.jpg",
    info:"Песня вошла в альбом Play. Этот альбом стал важным этапом для Моби и сделал его музыку широко известной. В записи использованы вокальные элементы и электронная аранжировка, характерные для его стиля конца 1990-х годов."
},
{
    file:"song7.mp3",
    name:"Like A Tattoo",
    artist:"Шаде",
    year:"2000",
    cover:"cover7.jpg",
    info:"Песня вошла в альбом Lovers Rock. Текст построен как рассказ о встрече и воспоминании, которое сохранилось на многие годы. Шаде часто использует спокойную повествовательную форму, где история раскрывается постепенно."
},
{
    file:"song8.mp3",
    name:"All I Need",
    artist:"Эйр",
    year:"1998",
    cover:"cover8.jpg",
    info:"Песня вошла в дебютный альбом Moon Safari французского дуэта Air. Альбом стал известен своим мягким электронным звучанием и вниманием к мелодии. Эта композиция стала одной из заметных работ группы раннего периода."
},
{
    file:"song9.mp3",
    name:"Shape Of My Heart",
    artist:"Стинг",
    year:"1993",
    cover:"cover9.jpg",
    info:"Песня вышла на альбоме Ten Summoner’s Tales. Текст использует образ карточного игрока, через которого поднимаются темы знания, выбора и судьбы. Со временем композиция получила новую известность благодаря использованию в кино и последующим переработкам."
},
{
    file:"song10.mp3",
    name:"Suzanne",
    artist:"Леонард Коэн",
    year:"1967",
    cover:"cover10.jpg",
    info:"Песня основана на стихотворении Леонарда Коэна. Её героиня связана с образом Сюзанн Вердаль, знакомой автора в Монреале. Сначала текст существовал как поэзия, а затем был превращён в песню и вошёл в ранний период творчества Коэна."
},
{
    file:"song11.mp3",
    name:"Life Is Real (Song For Lennon)",
    artist:"Куин",
    year:"1982",
    cover:"cover11.jpg",
    info:"Песня вошла в альбом Hot Space. Она была написана как посвящение Джону Леннону после его смерти. Подзаголовок Song For Lennon прямо указывает на память о музыканте и уважение к его влиянию."
},
{
    file:"song12.mp3",
    name:"Here Comes The Sun",
    artist:"Битлз",
    year:"1969",
    cover:"cover12.jpg",
    info:"Автор песни — Джордж Харрисон. Она появилась во время работы группы над альбомом Abbey Road. По воспоминаниям Харрисона, идея пришла к нему весной во время отдыха в саду дома Эрика Клэптона."
},
{
    file:"song13.mp3",
    name:"Chove Chuva",
    artist:"Жоржи Бен Жор",
    year:"1963",
    cover:"cover13.jpg",
    info:"Название переводится как «Идёт дождь». Это одна из ранних известных песен Жоржи Бен Жора. В ней сочетаются элементы самбы и городской бразильской популярной музыки, характерные для начала его карьеры."
}
];

let currentSong = 0;

const player = document.getElementById("player");
const playlistDiv = document.getElementById("playlist");

player.addEventListener("error", () => {
    alert("Не удалось загрузить файл: " + player.src);
});

function renderPlaylist(){
    playlistDiv.innerHTML = "";

    songs.forEach((song,index) => {
        const card = document.createElement("div");
        card.className = "song";

        if(index === currentSong){
            card.classList.add("active");
        }

        card.innerHTML = `
            <div class="song-header">
                <img src="${song.cover}" alt="Обложка"
                     onerror="this.src='cover1.jpg'">
                <div>
                    <div class="song-title">${song.name}</div>
                    <div class="song-artist">${song.artist}</div>
                </div>
            </div>

            <div class="song-details">
                <div class="song-details-inner">
                    <div class="meta">Год: ${song.year}</div>
                    <div>${song.info}</div>
                </div>
            </div>
        `;

        card.addEventListener("click", () => {
            playSong(index);
        });

        playlistDiv.appendChild(card);
    });
}

function playSong(index){
    currentSong = index;

    player.pause();
    player.removeAttribute("src");
    player.load();

    player.src = songs[index].file;
    player.load();

    player.play().catch(err => {
        console.log(err);
    });

    renderPlaylist();
}

player.addEventListener("ended", () => {
    currentSong = (currentSong + 1) % songs.length;
    playSong(currentSong);
});

function init(){
    renderPlaylist();
    player.src = songs[0].file;
    player.load();
}

init();
</script>

</body>
</html>
```
