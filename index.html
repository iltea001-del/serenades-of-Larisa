<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Плейлист</title>

<style>
body{
    background:#FFA733;
    font-family:"Courier New", monospace;
    margin:0;
    min-height:100vh;
    padding:20px;
    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    align-items:center;

    text-align:center;
}

h1{
    color:black;
    font-size:clamp(28px,8vw,60px);
    margin-bottom:20px;
}

audio{
    width:min(90vw,420px);
    margin-bottom:15px;
}

#playlist{
    width:min(90vw,420px);
    text-align:left;
}

.song{
    background:rgba(0,0,0,0.10);
    border-radius:12px;
    margin:8px 0;
    padding:10px;
    color:black;
    cursor:pointer;
    overflow:hidden;
    transition:
        transform 0.2s ease,
        background 0.25s ease,
        color 0.25s ease;
}

.song:hover{
    transform:translateY(-2px);
}

.song-header{
    display:flex;
    align-items:center;
    gap:12px;
}

.song img{
    width:54px;
    height:54px;
    border-radius:8px;
    object-fit:cover;
    flex-shrink:0;
}

.song-title{
    font-weight:bold;
    font-size:16px;
}

.song-artist{
    font-size:14px;
    opacity:0.85;
}

.song-details{
    max-height:0;
    opacity:0;
    overflow:hidden;
    margin-top:0;
    transition:
        max-height 0.45s ease,
        opacity 0.35s ease,
        margin-top 0.35s ease;
    font-size:14px;
    line-height:1.45;
}

.song.active{
    background:black;
    color:#FFA733;
}

.song.active .song-details{
    max-height:320px;
    opacity:1;
    margin-top:10px;
}

.meta{
    font-weight:bold;
    margin-bottom:8px;
}
</style>
</head>

<body>

<h1>хорошей зарядки бабуля!</h1>

<audio id="player" controls></audio>

<div id="playlist"></div>

<script>
const songs = [
{
    file:"song1.mp3",
    name:"Clair de Lune",
    artist:"Клод Дебюсси",
    year:"1905",
    cover:"cover1.jpg",
    info:"Одна из самых известных фортепианных пьес в мире. Название переводится как «Лунный свет». Дебюсси вдохновлялся поэзией и природой. Музыка мягкая, спокойная и словно вечерняя прогулка под луной."
},
{
    file:"song2.mp3",
    name:"Spring 1",
    artist:"Макс Рихтер",
    year:"2012",
    cover:"cover2.jpg",
    info:"Современное переосмысление музыки Вивальди. Немецко-британский композитор Макс Рихтер взял классическую тему весны и сделал её более нежной и кинематографичной. Музыка о пробуждении природы и новой энергии."
},
{
    file:"song3.mp3",
    name:"The Strong",
    artist:"Эннио Морриконе",
    year:"1970-е",
    cover:"cover3.jpg",
    info:"Морриконе прославился музыкой к фильмам. Его произведения всегда очень эмоциональны и выразительны. Эта композиция передаёт силу характера, напряжение и внутреннюю стойкость."
},
{
    file:"song4.mp3",
    name:"Comptine d’un autre été",
    artist:"Ян Тьерсен",
    year:"2001",
    cover:"cover4.jpg",
    info:"Французский композитор Ян Тьерсен стал знаменит после фильма «Амели». Эта пьеса наполнена лёгкой грустью, воспоминаниями и мечтательным настроением. Очень тёплая и душевная музыка."
},
{
    file:"song5.mp3",
    name:"Joycelyn's Dance",
    artist:"berlioz",
    year:"2020-е",
    cover:"cover5.jpg",
    info:"Современный артист, вдохновлённый джазом и лёгкими ритмами. Композиция звучит живо, свободно и красиво. Создаёт ощущение танца, лёгкости и хорошего настроения."
},
{
    file:"song6.mp3",
    name:"Porcelain",
    artist:"Moby",
    year:"1999",
    cover:"cover6.jpg",
    info:"Одна из самых известных композиций Моби. Очень спокойная и атмосферная музыка с мягким голосом и нежным сопровождением. Часто ассоциируется с размышлениями, дорогой и внутренним покоем."
},
{
    file:"song7.mp3",
    name:"Like A Tattoo",
    artist:"Sade",
    year:"2000",
    cover:"cover7.jpg",
    info:"Певица Шаде известна своим мягким и глубоким голосом. Эта песня рассказывает историю воспоминаний, которые остаются в сердце навсегда — словно татуировка на душе."
}
];

let currentSong = 0;

const player = document.getElementById("player");
const playlistDiv = document.getElementById("playlist");

/* ---------- ошибка загрузки ---------- */
player.addEventListener("error", () => {
    alert("Не удалось загрузить файл: " + player.src);
});

/* ---------- отрисовка списка ---------- */
function renderPlaylist(){
    playlistDiv.innerHTML = "";

    songs.forEach((song, index) => {
        const card = document.createElement("div");
        card.className = "song";

        if(index === currentSong){
            card.classList.add("active");
        }

        card.innerHTML = `
            <div class="song-header">
                <img src="${song.cover}" alt="Обложка">
                <div>
                    <div class="song-title">${song.name}</div>
                    <div class="song-artist">${song.artist}</div>
                </div>
            </div>

            <div class="song-details">
                <div class="meta">Год: ${song.year}</div>
                <div>${song.info}</div>
            </div>
        `;

        card.addEventListener("click", () => {
            playSong(index);
        });

        playlistDiv.appendChild(card);
    });
}

/* ---------- воспроизведение ---------- */
function playSong(index){
    currentSong = index;

    player.pause();
    player.src = songs[index].file;
    player.load();

    player.play().catch(err => {
        console.log(err);
    });

    renderPlaylist();
}

/* ---------- следующая песня автоматически ---------- */
player.addEventListener("ended", () => {
    currentSong = (currentSong + 1) % songs.length;
    playSong(currentSong);
});

/* ---------- запуск ---------- */
function init(){
    renderPlaylist();
    player.src = songs[0].file;
    player.load();
}

init();
</script>

</body>
</html>
